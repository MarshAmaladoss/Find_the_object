<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden Detective: New Cases</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #140f0b; font-family: 'Segoe UI', sans-serif; color: #fff;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        .header {
            width: 100%; height: 60px; background: #000; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #e67e22; z-index: 10; flex-shrink: 0;
        }
        .hud-title { color: #e67e22; font-weight: 900; letter-spacing: 1px; }
        .hud-timer { color: #ff4444; font-size: 22px; font-weight: bold; }
        .hud-score { color: #00ff88; font-weight: bold; }

        .tray-container {
            width: 100%; background: #221810; padding: 12px;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;
            border-bottom: 2px solid #3a271a; min-height: 55px; flex-shrink: 0;
        }
        .clue-tag {
            background: #0f0a06; padding: 6px 14px; border-radius: 20px;
            border: 1px solid #e67e22; font-size: 13px; transition: all 0.3s;
        }
        .clue-tag.found {
            background: #1b3d1e; border-color: #00ff88; color: #85ff9e;
            text-decoration: line-through; opacity: 0.5;
        }

        #game-viewport {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            padding: 15px 0;
        }

        /* Responsive Sandbox explicitly matching the target 768x1376 Aspect Profile */
        #scene-container {
            position: relative; 
            width: 92vw; 
            max-width: 420px; 
            aspect-ratio: 768 / 1376;
            border: 4px solid #3a271a; 
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8);
            background: #000;
            height: fit-content;
        }
        
        #background-img { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: fill;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Bounding target area elements */
        .hotspot-overlay {
            position: absolute;
            cursor: crosshair;
            z-index: 5;
            
            /* DEBUG HELPER: Change 'transparent' to 'rgba(255, 0, 0, 0.4)' to make the target zones visible! */
            background: transparent; 
        }

        .ring-indicator {
            position: absolute; border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 10;
        }
        .ring-match { border: 4px solid #00ff88; animation: burst 0.4s ease-out forwards; }
        .ring-miss { border: 4px solid #ff4444; animation: burst 0.4s ease-out forwards; }

        @keyframes burst {
            0% { width: 10px; height: 10px; opacity: 1; }
            100% { width: 45px; height: 45px; opacity: 0; }
        }

        .panel-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 10, 6, 0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 25px;
        }
        .btn {
            padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold;
            font-size: 16px; cursor: pointer; background: #e67e22; color: #fff;
            box-shadow: 0 4px 0 #a05010; transition: transform 0.1s; margin: 10px;
        }
        input {
            padding: 15px; border-radius: 10px; border: 2px solid #e67e22;
            background: #000; color: #fff; font-size: 18px; text-align: center;
            width: 260px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="hud-title" id="stage-label">CASE 1/4</div>
        <div class="hud-timer" id="timer-text">01:00</div>
        <div class="hud-score">STREAK: <span id="streak-num">0</span></div>
    </div>

    <div class="tray-container" id="tray"></div>

    <div id="game-viewport">
        <div id="scene-container" onclick="triggerBackgroundMiss(event)">
            <img id="background-img" src="" alt="Investigation Scene">
            
            <div id="overlay-hotspots-holder"></div>
        </div>
    </div>

    <div id="start-panel" class="panel-overlay" style="display: flex;">
        <h1 style="color: #e67e22; font-size: 34px; margin-bottom: 5px;">NEW CASE INVESTIGATOR</h1>
        <p style="color: #aaa; margin-bottom: 30px;">4 Portrait Maps • Invisible Overlay Mesh System</p>
        <input type="text" id="nameInput" placeholder="Enter Agent Initials">
        <button class="btn" onclick="initiateGame()">BEGIN CASE</button>
    </div>

    <div id="clear-panel" class="panel-overlay">
        <h1 style="color: #00ff88; font-size: 40px;" id="clear-header">SCENE CLEARED</h1>
        <p id="clear-commentary" style="color: #ccc; margin-bottom: 25px; font-size: 18px;"></p>
        <button class="btn" id="action-step-btn" onclick="progressPipeline()">CONTINUE</button>
    </div>

    <script>
        const backgroundImg = document.getElementById('background-img');
        const container = document.getElementById('scene-container');
        const hotspotsHolder = document.getElementById('overlay-hotspots-holder');
        const tray = document.getElementById('tray');

        let currentStageIndex = 0;
        let timeRemaining = 60;
        let clockInterval = null;
        let agentName = "";
        let globalStreak = 0;

        // Bounding box setups custom scaled for 768x1376 frame configurations
        const levelManifest = [
            {
                title: "CASE 1: THE TOY STUDY ROOM",
                bgSrc: "30592.png", 
                clues: [
                    { name: "Terrestrial Globe", left: "4.5%", top: "4.5%", width: "17%", height: "10%", found: false, radius: "50%" },
                    { name: "Pink Piggy Bank", left: "76.5%", top: "35.5%", width: "17%", height: "10%", found: false, radius: "50%" },
                    { name: "Africa Map Poster", left: "37.5%", top: "18.5%", width: "14%", height: "12%", found: false, radius: "8px" },
                    { name: "Green Desk Lamp", left: "8.0%", top: "36.0%", width: "15%", height: "11%", found: false, radius: "20px" },
                    { name: "Abacus Frame", left: "82.5%", top: "21.5%", width: "13%", height: "12%", found: false, radius: "8px" }
                ]
            },
            {
                title: "CASE 2: THE OCEAN VIEW LOUNGE",
                bgSrc: "30680.png",
                clues: [
                    { name: "Hanging Blue Dress", left: "42.5%", top: "14.5%", width: "16%", height: "12%", found: false, radius: "8px" },
                    { name: "Yellow Straw Hat", left: "41.5%", top: "24.5%", width: "14%", height: "10%", found: false, radius: "50%" },
                    { name: "Toy Wooden Horse", left: "71.5%", top: "41.5%", width: "14%", height: "10%", found: false, radius: "8px" },
                    { name: "Vintage Brass Compass", left: "33.5%", top: "30.5%", width: "11%", height: "8%", found: false, radius: "50%" },
                    { name: "Large Burlap Sack", left: "51.5%", top: "33.5%", width: "16%", height: "13%", found: false, radius: "12px" }
                ]
            },
            {
                title: "CASE 3: THE FOREST PLAYGROUND",
                bgSrc: "30682.png",
                clues: [
                    { name: "Wooden Treehouse", left: "50.5%", top: "4.5%", width: "18%", height: "13%", found: false, radius: "12px" },
                    { name: "Striped Playground Ball", left: "44.5%", top: "37.5%", width: "14%", height: "9%", found: false, radius: "50%" },
                    { name: "Sitting Tree Bird", left: "79.5%", top: "6.5%", width: "12%", height: "8%", found: false, radius: "50%" },
                    { name: "Magnifying Glass", left: "59.5%", top: "45.5%", width: "13%", height: "8%", found: false, radius: "50%" },
                    { name: "Hanging Tree Clock", left: "3.5%", top: "3.5%", width: "12%", height: "8%", found: false, radius: "50%" }
                ]
            },
            {
                title: "CASE 4: THE NEON BEDROOM",
                bgSrc: "30684.png", 
                clues: [
                    { name: "Laptop Workspace", left: "33.5%", top: "38.5%", width: "17%", height: "13%", found: false, radius: "8px" },
                    { name: "Sleeping Orange Cat", left: "48.5%", top: "22.5%", width: "14%", height: "10%", found: false, radius: "50%" },
                    { name: "Orrery Solar Model", left: "6.5%", top: "2.5%", width: "15%", height: "10%", found: false, radius: "12px" },
                    { name: "Cloud Ceiling Fan", left: "40.5%", top: "1.5%", width: "16%", height: "11%", found: false, radius: "50%" },
                    { name: "Plush Unicorn Toy", left: "75.5%", top: "27.5%", width: "13%", height: "9%", found: false, radius: "12px" }
                ]
            }
        ];

        function initiateGame() {
            agentName = document.getElementById('nameInput').value.trim() || "Agent X";
            document.getElementById('start-panel').style.display = "none";
            currentStageIndex = 0;
            globalStreak = 0;
            document.getElementById('streak-num').innerText = globalStreak;
            loadStage();
        }

        function loadStage() {
            const currentStage = levelManifest[currentStageIndex];
            document.getElementById('stage-label').innerText = `CASE ${currentStageIndex + 1}/${levelManifest.length}`;
            
            backgroundImg.src = currentStage.bgSrc;
            currentStage.clues.forEach(c => c.found = false);
            
            buildInteractiveGrid();
            generateTrayMarkup();
            startCountdown();
        }

        // Render transparent overlay element fields straight over the responsive container box layout
        function buildInteractiveGrid() {
            hotspotsHolder.innerHTML = "";
            const currentStage = levelManifest[currentStageIndex];

            currentStage.clues.forEach(clue => {
                const box = document.createElement('div');
                box.className = "hotspot-overlay";
                box.style.left = clue.left;
                box.style.top = clue.top;
                box.style.width = clue.width;
                box.style.height = clue.height;
                box.style.borderRadius = clue.radius;
                
                box.onclick = function(e) {
                    e.stopPropagation(); // Halt bubbling sequence to prevent the background hit-miss trigger
                    if (timeRemaining <= 0 || clue.found) return;

                    clue.found = true;
                    box.style.display = "none"; // Purge target layout bounds seamlessly from view

                    const rect = container.getBoundingClientRect();
                    renderPulseRing(e.clientX - rect.left, e.clientY - rect.top, 'ring-match');
                    generateTrayMarkup();

                    if (currentStage.clues.every(c => c.found)) {
                        terminateCountdown();
                        triggerEvaluationScreen(true);
                    }
                };

                hotspotsHolder.appendChild(box);
            });
        }

        function triggerBackgroundMiss(e) {
            if (timeRemaining <= 0) return;
            const rect = container.getBoundingClientRect();
            renderPulseRing(e.clientX - rect.left, e.clientY - rect.top, 'ring-miss');
        }

        function generateTrayMarkup() {
            tray.innerHTML = "";
            levelManifest[currentStageIndex].clues.forEach(clue => {
                const badge = document.createElement('div');
                badge.className = `clue-tag ${clue.found ? 'found' : ''}`;
                badge.innerText = clue.name;
                tray.appendChild(badge);
            });
        }

        function renderPulseRing(posX, posY, typeClass) {
            const burstNode = document.createElement('div');
            burstNode.className = `ring-indicator ${typeClass}`;
            burstNode.style.left = `${posX}px`;
            burstNode.style.top = `${posY}px`;
            container.appendChild(burstNode);
            setTimeout(() => burstNode.remove(), 400);
        }

        function startCountdown() {
            timeRemaining = 60;
            updateCountdownText();
            clearInterval(clockInterval);
            clockInterval = setInterval(() => {
                timeRemaining--;
                updateCountdownText();
                if (timeRemaining <= 0) {
                    terminateCountdown();
                    triggerEvaluationScreen(false);
                }
            }, 1000);
        }

        function updateCountdownText() {
            const minutes = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
            const seconds = String(timeRemaining % 60).padStart(2, '0');
            document.getElementById('timer-text').innerText = `${minutes}:${seconds}`;
        }

        function terminateCountdown() { clearInterval(clockInterval); }

        function triggerEvaluationScreen(isVictory) {
            const modal = document.getElementById('clear-panel');
            const header = document.getElementById('clear-header');
            const commentary = document.getElementById('clear-commentary');
            const actionBtn = document.getElementById('action-step-btn');
            
            modal.style.display = "flex";

            if (isVictory) {
                globalStreak++;
                document.getElementById('streak-num').innerText = globalStreak;

                header.innerText = "CASE SOLVED!";
                header.style.color = "#00ff88";
                commentary.innerText = `Sensational tracking, ${agentName}!`;
                actionBtn.innerText = currentStageIndex === levelManifest.length - 1 ? "FINISH ASSIGNMENT" : "NEXT LOCATION";
            } else {
                header.innerText = "CASE COLD";
                header.style.color = "#ff4444";
                commentary.innerText = `The target objects slipped away. Resetting tracking parameters to Room 1.`;
                actionBtn.innerText = "RETRY INTELLIGENCE";
            }
        }

        function progressPipeline() {
            document.getElementById('clear-panel').style.display = "none";
            const currentStage = levelManifest[currentStageIndex];
            const allCleared = currentStage.clues.every(c => c.found);

            if (allCleared) {
                if (currentStageIndex < levelManifest.length - 1) {
                    currentStageIndex++;
                    loadStage();
                } else {
                    document.getElementById('start-panel').style.display = "flex";
                }
            } else {
                currentStageIndex = 0;
                document.getElementById('start-panel').style.display = "flex";
            }
        }
    </script>
</body>
</html>

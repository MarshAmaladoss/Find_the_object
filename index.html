<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden Detective: New Cases</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #140f0b; font-family: 'Segoe UI', sans-serif; color: #fff;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        .header {
            width: 100%; height: 60px; background: #000; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #e67e22; z-index: 10;
        }
        .hud-title { color: #e67e22; font-weight: 900; letter-spacing: 1px; }
        .hud-timer { color: #ff4444; font-size: 22px; font-weight: bold; }
        .hud-score { color: #00ff88; font-weight: bold; }

        .tray-container {
            width: 100%; background: #221810; padding: 12px;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;
            border-bottom: 2px solid #3a271a; min-height: 55px;
        }
        .clue-tag {
            background: #0f0a06; padding: 6px 14px; border-radius: 20px;
            border: 1px solid #e67e22; font-size: 13px; transition: all 0.3s;
        }
        .clue-tag.found {
            background: #1b3d1e; border-color: #00ff88; color: #85ff9e;
            text-decoration: line-through; opacity: 0.5;
        }

        /* Interactive Zoom & Pan Controls */
        .control-bar {
            display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 10px; z-index: 5;
        }
        .btn-row {
            display: flex; gap: 8px;
        }
        .tool-btn {
            background: #2c1d11; border: 1px solid #e67e22; color: #fff;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px;
        }
        .tool-btn:active { background: #e67e22; }

        /* Exact 9:16 Portrait Box */
        #scene-container {
            position: relative; width: 90%; max-width: 420px;
            aspect-ratio: 9 / 16; margin: 15px 0; 
            border: 4px solid #3a271a; border-radius: 12px;
            overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.8);
            background: #000;
        }
        #zoom-wrapper {
            width: 100%; height: 100%;
            transition: transform 0.15s ease-out;
            transform-origin: top left;
            position: relative;
        }
        #scene-img { 
            width: 100%; height: 100%; display: block; 
            object-fit: fill;
        }

        /* Responsive Percentage Hotspots */
        .hotspot {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            /* Change background to rgba(255,0,0,0.3) if you want to visually see the target areas while debugging */
            background: rgba(0, 0, 0, 0); 
            transform: translate(-50%, -50%);
        }

        .ring-indicator {
            position: absolute; border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 30;
        }
        .ring-match { border: 4px solid #00ff88; animation: burst 0.4s ease-out forwards; }
        .ring-miss { border: 4px solid #ff4444; animation: burst 0.4s ease-out forwards; }

        @keyframes burst {
            0% { width: 10px; height: 10px; opacity: 1; }
            100% { width: 45px; height: 45px; opacity: 0; }
        }

        .panel-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 10, 6, 0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 25px;
        }
        .btn {
            padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold;
            font-size: 16px; cursor: pointer; background: #e67e22; color: #fff;
            box-shadow: 0 4px 0 #a05010; transition: transform 0.1s; margin: 10px;
        }
        input {
            padding: 15px; border-radius: 10px; border: 2px solid #e67e22;
            background: #000; color: #fff; font-size: 18px; text-align: center;
            width: 260px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="hud-title" id="stage-label">CASE 1/4</div>
        <div class="hud-timer" id="timer-text">01:00</div>
        <div class="hud-score">STREAK: <span id="streak-num">0</span></div>
    </div>

    <div class="tray-container" id="tray"></div>

    <div class="control-bar">
        <div class="btn-row">
            <button class="tool-btn" onclick="adjustZoom(0.4)">🔍 ZOOM +</button>
            <button class="tool-btn" onclick="adjustZoom(-0.4)">🔍 ZOOM -</button>
            <button class="tool-btn" onclick="resetZoom()">🔄 RESET</button>
        </div>
        <div class="btn-row">
            <button class="tool-btn" onclick="panImage(0, -60)">⬆️ UP</button>
            <button class="tool-btn" onclick="panImage(0, 60)">⬇️ DOWN</button>
            <button class="tool-btn" onclick="panImage(-60, 0)">⬅️ LEFT</button>
            <button class="tool-btn" onclick="panImage(60, 0)">➡️ RIGHT</button>
        </div>
    </div>

    <div id="scene-container">
        <div id="zoom-wrapper">
            <img id="scene-img" src="" alt="Investigation Scene" onclick="triggerMissEffect(event)">
            <div id="hotspot-holder"></div>
        </div>
    </div>

    <div id="start-panel" class="panel-overlay" style="display: flex;">
        <h1 style="color: #e67e22; font-size: 34px; margin-bottom: 5px;">NEW CASE INVESTIGATOR</h1>
        <p style="color: #aaa; margin-bottom: 30px;">4 Portrait Maps • Hotspot Tracking Alternative</p>
        <input type="text" id="nameInput" placeholder="Enter Agent Initials">
        <button class="btn" onclick="initiateGame()">BEGIN CASE</button>
    </div>

    <div id="clear-panel" class="panel-overlay">
        <h1 style="color: #00ff88; font-size: 40px;" id="clear-header">SCENE CLEARED</h1>
        <p id="clear-commentary" style="color: #ccc; margin-bottom: 25px; font-size: 18px;"></p>
        <button class="btn" id="action-step-btn" onclick="progressPipeline()">CONTINUE</button>
    </div>

    <script>
        const img = document.getElementById('scene-img');
        const zoomWrapper = document.getElementById('zoom-wrapper');
        const container = document.getElementById('scene-container');
        const hotspotHolder = document.getElementById('hotspot-holder');
        const tray = document.getElementById('tray');

        let currentStageIndex = 0;
        let timeRemaining = 60;
        let clockInterval = null;
        let agentName = "";
        let globalStreak = 0;
        
        let currentZoomScale = 1;
        let panX = 0;
        let panY = 0;

        // Visual targets defined using scalable percentage values relative to the portrait image size
        const levelManifest = [
            {
                title: "CASE 1: THE TOY STUDY ROOM",
                src: "30592.png", 
                clues: [
                    { name: "Terrestrial Globe", x: "10.2%", y: "8.1%", w: "16%", h: "10%", found: false },
                    { name: "Pink Piggy Bank", x: "83.7%", y: "38.2%", w: "16%", h: "10%", found: false },
                    { name: "Africa Map Poster", x: "43.5%", y: "22.3%", w: "15%", h: "12%", found: false },
                    { name: "Green Desk Lamp", x: "14.3%", y: "40.3%", w: "15%", h: "11%", found: false },
                    { name: "Abacus Frame", x:="88.4%", y: "24.7%", w: "14%", h: "12%", found: false }
                ]
            },
            {
                title: "CASE 2: THE OCEAN VIEW LOUNGE",
                src: "30680.png",
                clues: [
                    { name: "Hanging Blue Dress", x: "49.0%", y: "18.7%", w: "16%", h: "12%", found: false },
                    { name: "Yellow Straw Hat", x: "47.6%", y: "27.3%", w: "15%", h: "10%", found: false },
                    { name: "Toy Wooden Horse", x: "77.7%", y: "44.7%", w: "14%", h: "10%", found: false },
                    { name: "Vintage Brass Compass", x: "37.9%", y: "33.5%", w: "12%", h: "8%", found: false },
                    { name: "Large Burlap Sack", x: "58.3%", y: "37.5%", w: "16%", h: "13%", found: false }
                ]
            },
            {
                title: "CASE 3: THE FOREST PLAYGROUND",
                src: "30682.png",
                clues: [
                    { name: "Wooden Treehouse", x: "58.3%", y: "8.3%", w: "18%", h: "13%", found: false },
                    { name: "Striped Playground Ball", x: "50.9%", y: "40.1%", w: "15%", h: "9%", found: false },
                    { name: "Sitting Tree Bird", x: "84.7%", y: "9.6%", w: "12%", h: "8%", found: false },
                    { name: "Magnifying Glass", x: "65.2%", y: "48.4%", w: "14%", h: "8%", found: false },
                    { name: "Hanging Tree Clock", x: "8.7%", y: "7.0%", w: "12%", h: "8%", found: false }
                ]
            },
            {
                title: "CASE 4: THE NEON BEDROOM",
                src: "30684.png", 
                clues: [
                    { name: "Laptop Workspace", x: "41.2%", y: "42.4%", w: "18%", h: "13%", found: false },
                    { name: "Sleeping Orange Cat", x: "54.6%", y: "25.7%", w: "15%", h: "10%", found: false },
                    { name: "Orrery Solar Model", x: "12.5%", y: "5.7%", w: "15%", h: "10%", found: false },
                    { name: "Cloud Ceiling Fan", x: "47.2%", y: "3.9%", w: "16%", h: "11%", found: false },
                    { name: "Plush Unicorn Toy", x: "81.0%", y: "30.4%", w: "14%", h: "9%", found: false }
                ]
            }
        ];

        function initiateGame() {
            agentName = document.getElementById('nameInput').value.trim() || "Agent X";
            document.getElementById('start-panel').style.display = "none";
            currentStageIndex = 0;
            globalStreak = 0;
            document.getElementById('streak-num').innerText = globalStreak;
            loadStage();
        }

        function loadStage() {
            const currentStage = levelManifest[currentStageIndex];
            document.getElementById('stage-label').innerText = `CASE ${currentStageIndex + 1}/${levelManifest.length}`;
            resetZoom();
            
            img.src = currentStage.src;
            currentStage.clues.forEach(c => c.found = false);
            
            buildHotspotElements();
            generateTrayMarkup();
            startCountdown();
        }

        // Generate click boxes directly on top of the map image using scalable CSS styles
        function buildHotspotElements() {
            hotspotHolder.innerHTML = "";
            const currentStage = levelManifest[currentStageIndex];
            
            currentStage.clues.forEach((clue, index) => {
                const spot = document.createElement('div');
                spot.className = "hotspot";
                spot.style.left = clue.x;
                spot.style.top = clue.y;
                spot.style.width = clue.w;
                spot.style.height = clue.h;
                spot.setAttribute('data-index', index);
                
                spot.onclick = function(e) {
                    e.stopPropagation(); // Stop click from filtering down to the image layer
                    if (timeRemaining <= 0 || clue.found) return;
                    
                    clue.found = true;
                    spot.style.display = "none"; // Clear layout box out of view
                    
                    // Render hit ring directly at finger location
                    const rect = container.getBoundingClientRect();
                    renderPulseRing(e.clientX - rect.left, e.clientY - rect.top, 'ring-match');
                    
                    generateTrayMarkup();
                    
                    if (currentStage.clues.every(c => c.found)) {
                        terminateCountdown();
                        triggerEvaluationScreen(true);
                    }
                };
                
                hotspotHolder.appendChild(spot);
            });
        }

        function triggerMissEffect(e) {
            if (timeRemaining <= 0) return;
            const rect = container.getBoundingClientRect();
            renderPulseRing(e.clientX - rect.left, e.clientY - rect.top, 'ring-miss');
        }

        function generateTrayMarkup() {
            tray.innerHTML = "";
            levelManifest[currentStageIndex].clues.forEach(clue => {
                const badge = document.createElement('div');
                badge.className = `clue-tag ${clue.found ? 'found' : ''}`;
                badge.innerText = clue.name;
                tray.appendChild(badge);
            });
        }

        function updateTransform() {
            zoomWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoomScale})`;
        }

        function adjustZoom(amount) {
            const oldScale = currentZoomScale;
            currentZoomScale = Math.min(4, Math.max(1, currentZoomScale + amount));
            
            if (currentZoomScale === 1) {
                panX = 0;
                panY = 0;
            } else {
                const rect = container.getBoundingClientRect();
                panX -= (rect.width / 2) * (currentZoomScale - oldScale) / currentZoomScale;
                panY -= (rect.height / 2) * (currentZoomScale - oldScale) / currentZoomScale;
            }
            updateTransform();
        }

        function panImage(dx, dy) {
            if (currentZoomScale <= 1) return; 
            panX += dx;
            panY += dy;
            
            const rect = container.getBoundingClientRect();
            const maxPanX = 0;
            const minPanX = -rect.width * (currentZoomScale - 1);
            const maxPanY = 0;
            const minPanY = -rect.height * (currentZoomScale - 1);
            
            panX = Math.min(maxPanX, Math.max(minPanX, panX));
            panY = Math.min(maxPanY, Math.max(minPanY, panY));
            
            updateTransform();
        }

        function resetZoom() {
            currentZoomScale = 1;
            panX = 0;
            panY = 0;
            updateTransform();
        }

        function renderPulseRing(posX, posY, typeClass) {
            const burstNode = document.createElement('div');
            burstNode.className = `ring-indicator ${typeClass}`;
            burstNode.style.left = `${posX}px`;
            burstNode.style.top = `${posY}px`;
            container.appendChild(burstNode);
            setTimeout(() => burstNode.remove(), 400);
        }

        function startCountdown() {
            timeRemaining = 60;
            updateCountdownText();
            clearInterval(clockInterval);
            clockInterval = setInterval(() => {
                timeRemaining--;
                updateCountdownText();
                if (timeRemaining <= 0) {
                    terminateCountdown();
                    triggerEvaluationScreen(false);
                }
            }, 1000);
        }

        function updateCountdownText() {
            const minutes = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
            const seconds = String(timeRemaining % 60).padStart(2, '0');
            document.getElementById('timer-text').innerText = `${minutes}:${seconds}`;
        }

        function terminateCountdown() { clearInterval(clockInterval); }

        function triggerEvaluationScreen(isVictory) {
            const modal = document.getElementById('clear-panel');
            const header = document.getElementById('clear-header');
            const commentary = document.getElementById('clear-commentary');
            const actionBtn = document.getElementById('action-step-btn');
            
            modal.style.display = "flex";

            if (isVictory) {
                globalStreak++;
                document.getElementById('streak-num').innerText = globalStreak;

                header.innerText = "CASE SOLVED!";
                header.style.color = "#00ff88";
                commentary.innerText = `Sensational tracking, ${agentName}!`;
                actionBtn.innerText = currentStageIndex === levelManifest.length - 1 ? "FINISH ASSIGNMENT" : "NEXT LOCATION";
            } else {
                header.innerText = "CASE COLD";
                header.style.color = "#ff4444";
                commentary.innerText = `The target objects slipped away. Resetting tracking parameters to Room 1.`;
                actionBtn.innerText = "RETRY INTELLIGENCE";
            }
        }

        function progressPipeline() {
            document.getElementById('clear-panel').style.display = "none";
            const currentStage = levelManifest[currentStageIndex];
            const allCleared = currentStage.clues.every(c => c.found);

            if (allCleared) {
                if (currentStageIndex < levelManifest.length - 1) {
                    currentStageIndex++;
                    loadStage();
                } else {
                    document.getElementById('start-panel').style.display = "flex";
                }
            } else {
                currentStageIndex = 0;
                document.getElementById('start-panel').style.display = "flex";
            }
        }
    </script>
</body>
</html>
